<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Specialty Barista Training</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #111827;
            color: #F9FAFB;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
            background: rgba(31, 41, 55, 0.5);
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #F59E0B;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #9CA3AF;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .btn {
            background-color: #F59E0B;
            color: #111827;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #D97706;
        }
        .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/images/logo.png" alt="Logo" class="icon">
        <h1>You're Currently Offline</h1>
        <p>This content isn't available offline yet. Please check your internet connection and try again.</p>
        <p>Don't worry - any progress you've made is safely stored and will sync when you're back online.</p>
        <a href="/" class="btn">Return to Dashboard</a>
    </div>
</body>
</html>
